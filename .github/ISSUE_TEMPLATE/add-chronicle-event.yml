name: 新增编年史事件
description: 用表单提交一条新的小狗群编年史事件
title: "[编年史] "
body:
  - type: input
    id: event_date
    attributes:
      label: 事件日期
      description: 请使用 YYYY-MM-DD 格式，例如 2026-03-30
      placeholder: "2026-03-30"
    validations:
      required: true

  - type: input
    id: event_title
    attributes:
      label: 事件标题
      placeholder: "今天谁又整活了？"
    validations:
      required: true

  - type: textarea
    id: event_description
    attributes:
      label: 事件描述
      description: 简单描述发生了什么
      placeholder: "可以写一两句话"
    validations:
      required: true

  - type: textarea
    id: dog_names
    attributes:
      label: 相关小狗
      description: 填名字，用逗号或换行分隔（例如：Bubble, 大墨）
      placeholder: "Bubble, 大墨"
    validations:
      required: true

  - type: dropdown
    id: event_category
    attributes:
      label: 事件类型
      description: 选择最符合的事件类型
      options:
        - milestone（里程碑）
        - funny（搞笑）
        - meeting（相聚）
        - legend（传说）
    validations:
      required: true

  - type: textarea
    id: image
    attributes:
      label: 图片（可选）
      description: 可直接拖放或粘贴图片到此处，GitHub 会自动上传并生成链接；也可以填写已在仓库中的路径，例如 logs/20260330/new.jpg
      placeholder: "拖放图片到此处上传，或填写已有图片路径"
    validations:
      required: false

  - type: textarea
    id: audio
    attributes:
      label: 语音条（可选）
      description: 可直接拖放音频文件（mp3、m4a、wav、ogg 等）到此处，GitHub 会自动上传并生成链接
      placeholder: "拖放音频文件到此处上传"
    validations:
      required: false

  - type: textarea
    id: video
    attributes:
      label: 视频（可选）
      description: 可直接拖放视频文件（mp4、mov、webm 等）到此处，GitHub 会自动上传并生成链接
      placeholder: "拖放视频文件到此处上传"
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        提交后会自动生成一个 PR，管理员审核合并后网站会自动更新。
