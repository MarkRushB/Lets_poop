name: Issue 投稿自动生成 PR

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  issue-to-pr:
    if: startsWith(github.event.issue.title, '[编年史]')
    runs-on: ubuntu-latest

    steps:
      - name: Ensure timeline-entry label exists and apply to issue
        uses: actions/github-script@v7
        with:
          script: |
            // Create the label if it doesn't already exist
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'timeline-entry',
                color: 'e4e669',
                description: 'Issue is a timeline entry submission'
              });
            } catch (e) {
              const alreadyExists =
                e.status === 422 &&
                Array.isArray(e.response?.data?.errors) &&
                e.response.data.errors.some(err => err.code === 'already_exists');
              if (!alreadyExists) throw e;
            }
            // Apply the label to the current issue
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['timeline-entry']
            });

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Convert issue to chronicle event
        run: node .github/scripts/issue-to-chronicle.mjs

      - name: Create or update pull request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          # Use a PAT so GitHub Actions is allowed to create pull requests.
          # Create a fine-grained PAT with "Contents", "Pull requests", and
          # "Workflows" write permissions, then store it as the repository
          # secret GH_PAT.
          token: ${{ secrets.GH_PAT }}
          branch: automation/issue-${{ github.event.issue.number }}
          commit-message: "chore: add chronicle event from issue #${{ github.event.issue.number }}"
          title: "chore: 编年史投稿 #${{ github.event.issue.number }}"
          body-path: issue-summary.md
          labels: |
            automated-pr
            timeline-entry

      - name: Auto-merge pull request
        if: steps.cpr.outputs.pull-request-number != ''
        run: gh pr merge --auto --merge "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Comment PR link on issue
        if: steps.cpr.outputs.pull-request-url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const prUrl = '${{ steps.cpr.outputs.pull-request-url }}';
            const issueNumber = context.payload.issue.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `已自动生成/更新 PR：${prUrl}\n\nPR 将自动合并，合并后网页会自动更新。`
            });
